<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<!-- UAC_META_PLACEHOLDER -->
<title>Find Hidden Objects</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;font-family:'Arial',sans-serif}
body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);touch-action:none}
#start-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200}
#start-screen.hidden{display:none}
.start-content{text-align:center;color:white}
.game-title{font-size:48px;font-weight:bold;margin-bottom:20px;text-shadow:3px 3px 6px rgba(0,0,0,.3)}
.game-subtitle{font-size:24px;margin-bottom:40px;opacity:.95}
#start-button{padding:20px 60px;font-size:28px;background:white;color:#667eea;border:none;border-radius:50px;cursor:pointer;font-weight:bold;box-shadow:0 8px 20px rgba(0,0,0,.3);transition:transform .2s;animation:pulse 2s infinite}
#start-button:active{transform:scale(.95)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
#install-button{position:fixed;top:15px;right:15px;padding:12px 30px;font-size:18px;font-weight:bold;background:linear-gradient(135deg,#4CAF50 0%,#45a049 100%);color:white;border:none;border-radius:25px;cursor:pointer;box-shadow:0 4px 15px rgba(0,0,0,.3);z-index:150;transition:transform .2s}
#install-button:active{transform:scale(.95)}
#game-container{width:100vw;height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;position:relative}
#game-container.active{display:flex}
#scene-container{position:relative;width:90vw;height:55vh;margin:10px auto;box-shadow:0 10px 40px rgba(0,0,0,.3);border-radius:15px;overflow:hidden}
#scene-image{width:100%;height:100%;display:block;object-fit:cover;background:#f0f0f0}
.scene-prop{position:absolute;cursor:pointer;transition:opacity .3s}
.scene-prop img{width:100%;height:100%;object-fit:contain;pointer-events:none}
.scene-prop.found{opacity:0;pointer-events:none}
.hint-effect{position:absolute;width:120%;height:120%;top:-10%;left:-10%;border:3px solid #FFD700;border-radius:50%;animation:hintPulse 1.5s infinite;pointer-events:none;box-shadow:0 0 20px #FFD700,inset 0 0 20px #FFD700}
@keyframes hintPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:.5}}
.click-effect{position:absolute;width:150%;height:150%;top:-25%;left:-25%;border-radius:50%;background:radial-gradient(circle,rgba(255,215,0,.8) 0%,transparent 70%);animation:clickExpand .6s ease-out;pointer-events:none}
@keyframes clickExpand{0%{transform:scale(0);opacity:1}100%{transform:scale(1);opacity:0}}
.stars-effect{position:absolute;width:40px;height:40px;top:50%;left:50%;margin:-20px 0 0 -20px;font-size:30px;animation:starsFloat 1s ease-out;pointer-events:none}
@keyframes starsFloat{0%{transform:translateY(0) scale(0);opacity:1}100%{transform:translateY(-80px) scale(1.5);opacity:0}}
#progress-container{width:90vw;margin:15px auto;text-align:center}
#progress-text{font-size:22px;font-weight:bold;color:white;margin-bottom:10px;text-shadow:2px 2px 4px rgba(0,0,0,.3)}
#progress-bar{width:100%;height:30px;background:rgba(255,255,255,.3);border-radius:15px;overflow:hidden;box-shadow:inset 0 2px 5px rgba(0,0,0,.2)}
#progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#4CAF50 0%,#8BC34A 100%);transition:width .5s ease;box-shadow:0 0 10px rgba(76,175,80,.5)}
#object-list{width:90vw;margin:10px auto;display:flex;justify-content:center;align-items:center;flex-wrap:wrap;gap:10px}
.object-item{width:70px;height:70px;background:white;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 4px 10px rgba(0,0,0,.2);transition:all .3s;position:relative}
.object-item img{width:50px;height:50px;object-fit:contain}
.object-item.found{opacity:.3;transform:scale(.9)}
.object-item.found::after{content:'✓';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:40px;color:#4CAF50;font-weight:bold}
#win-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:300}
#win-screen.active{display:flex;animation:fadeIn .5s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.win-content{text-align:center;color:white}
.win-title{font-size:60px;font-weight:bold;margin-bottom:20px;color:#FFD700;text-shadow:3px 3px 6px rgba(0,0,0,.5);animation:bounce 1s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
.win-message{font-size:28px;margin-bottom:40px}
#play-again-button{padding:20px 60px;font-size:24px;background:linear-gradient(135deg,#4CAF50 0%,#45a049 100%);color:white;border:none;border-radius:50px;cursor:pointer;font-weight:bold;box-shadow:0 8px 20px rgba(0,0,0,.3);transition:transform .2s;margin-bottom:20px}
#play-again-button:active{transform:scale(.95)}
#install-now-button{padding:20px 60px;font-size:24px;background:linear-gradient(135deg,#FF6B6B 0%,#FF5252 100%);color:white;border:none;border-radius:50px;cursor:pointer;font-weight:bold;box-shadow:0 8px 20px rgba(0,0,0,.3);transition:transform .2s}
#install-now-button:active{transform:scale(.95)}
@media(max-width:768px){.game-title{font-size:36px}.game-subtitle{font-size:18px}#start-button{font-size:22px;padding:15px 45px}#scene-container{height:45vh}.object-item{width:60px;height:60px}.object-item img{width:40px;height:40px}}
</style>
</head>
<body>
<button id="install-button" onclick="installGame()">INSTALL NOW</button>

<div id="start-screen">
    <div class="start-content">
        <div class="game-title">Find Hidden Objects</div>
        <div class="game-subtitle">Discover all the hidden items!</div>
        <button id="start-button">START GAME</button>
    </div>
</div>

<div id="game-container">
    <div id="progress-container">
        <div id="progress-text">Found: 0/0</div>
        <div id="progress-bar">
            <div id="progress-fill"></div>
        </div>
    </div>
    <div id="scene-container">
        <img id="scene-image" src="" />
    </div>
    <div id="object-list"></div>
</div>

<div id="win-screen">
    <div class="win-content">
        <div class="win-title">🎉 CONGRATULATIONS! 🎉</div>
        <div class="win-message">You found all the hidden objects!</div>
        <button id="play-again-button">PLAY AGAIN</button>
        <button id="install-now-button">INSTALL NOW</button>
    </div>
</div>

<script>
var CLICK_URL = "STORE_URL_PLACEHOLDER";
var SCENE_IMG = /*{{SCENE_IMG}}*/"";
var ITEMS = /*{{ITEMS}}*/[];

function installGame() {
    try {
        if (window.dapi && window.dapi.openStoreUrl) { window.dapi.openStoreUrl(); return; }
    } catch(e) {}
    try {
        if (window.FbPlayableAd) { window.FbPlayableAd.onCTAClick(); return; }
    } catch(e) {}
    try {
        if (window.ExitApi) { window.ExitApi(); window.ExitApi.exit && window.ExitApi.exit(); return; }
    } catch(e) {}
    try {
        if (window.install) { window.install(); window.gameEnd && window.gameEnd(); return; }
    } catch(e) {}
    try {
        if (window.playableSDK && window.playableSDK.openAppStore) { window.playableSDK.openAppStore(); return; }
    } catch(e) {}
    try {
        if (typeof mraid !== 'undefined' && mraid.open) { mraid.open(CLICK_URL); return; }
    } catch(e) {}
    window.open(CLICK_URL, '_blank');
}

var audioContext, bgmGain;
function initAudio() {
    if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
}

function playBGM() {
    try {
        initAudio();
        bgmGain = audioContext.createGain();
        bgmGain.gain.value = 0.12;
        bgmGain.connect(audioContext.destination);
        var notes = [261.63, 293.66, 329.63, 392.00, 440.00];
        var noteIndex = 0;
        function playNote() {
            if (!audioContext || !bgmGain) return;
            var osc = audioContext.createOscillator();
            var gain = audioContext.createGain();
            osc.type = 'sine';
            osc.frequency.value = notes[noteIndex % notes.length];
            gain.gain.value = 0;
            gain.gain.linearRampToValueAtTime(0.3, audioContext.currentTime + 0.5);
            gain.gain.linearRampToValueAtTime(0, audioContext.currentTime + 3);
            osc.connect(gain);
            gain.connect(bgmGain);
            osc.start(audioContext.currentTime);
            osc.stop(audioContext.currentTime + 3);
            noteIndex++;
            setTimeout(playNote, 2000);
        }
        playNote();
    } catch(e) {}
}

function playClickSound() {
    try {
        initAudio();
        var now = audioContext.currentTime;
        var osc1 = audioContext.createOscillator();
        var gain1 = audioContext.createGain();
        osc1.type = 'sine';
        osc1.frequency.value = 880;
        gain1.gain.value = 0.3;
        gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        osc1.connect(gain1);
        gain1.connect(audioContext.destination);
        osc1.start(now);
        osc1.stop(now + 0.3);

        var osc2 = audioContext.createOscillator();
        var gain2 = audioContext.createGain();
        osc2.type = 'sine';
        osc2.frequency.value = 1108.73;
        gain2.gain.value = 0.2;
        gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
        osc2.connect(gain2);
        gain2.connect(audioContext.destination);
        osc2.start(now + 0.05);
        osc2.stop(now + 0.4);

        var osc3 = audioContext.createOscillator();
        var gain3 = audioContext.createGain();
        osc3.type = 'sine';
        osc3.frequency.value = 1760;
        gain3.gain.value = 0.15;
        gain3.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
        osc3.connect(gain3);
        gain3.connect(audioContext.destination);
        osc3.start(now + 0.1);
        osc3.stop(now + 0.5);
    } catch(e) {}
}

var foundObjects = new Set();
var currentHintIndex = 0;
var hintTimeout = null;

var startScreen = document.getElementById('start-screen');
var gameContainer = document.getElementById('game-container');
var winScreen = document.getElementById('win-screen');
var sceneContainer = document.getElementById('scene-container');
var progressText = document.getElementById('progress-text');
var progressFill = document.getElementById('progress-fill');

document.getElementById('scene-image').src = SCENE_IMG;

var objectList = document.getElementById('object-list');
ITEMS.forEach(function(item, index) {
    var div = document.createElement('div');
    div.className = 'object-item';
    div.dataset.id = index;
    var img = document.createElement('img');
    img.src = item.thumb || '';
    img.alt = item.name || ('Item ' + (index + 1));
    div.appendChild(img);
    objectList.appendChild(div);
});

document.getElementById('start-button').addEventListener('click', function() {
    startScreen.classList.add('hidden');
    gameContainer.classList.add('active');
    initGame();
    playBGM();
});

document.getElementById('play-again-button').addEventListener('click', function() {
    winScreen.classList.remove('active');
    resetGame();
});

document.getElementById('install-now-button').addEventListener('click', installGame);

function initGame() {
    sceneContainer.innerHTML = '<img id="scene-image" src="' + SCENE_IMG + '" />';
    
    ITEMS.forEach(function(item, index) {
        var propDiv = document.createElement('div');
        propDiv.className = 'scene-prop';
        propDiv.dataset.id = index;
        propDiv.style.top = (item.y * 100 - 8) + '%';
        propDiv.style.left = (item.x * 100 - 8) + '%';
        propDiv.style.width = '16%';
        propDiv.style.height = '16%';
        
        var img = document.createElement('img');
        img.src = item.thumb || '';
        img.alt = item.name || ('Item ' + (index + 1));
        propDiv.appendChild(img);
        
        propDiv.addEventListener('click', function() { handleObjectClick(index); });
        sceneContainer.appendChild(propDiv);
    });
    
    currentHintIndex = 0;
    showNextHint();
}

function showNextHint() {
    if (currentHintIndex >= 3) return;
    if (currentHintIndex >= ITEMS.length) return;
    if (foundObjects.has(currentHintIndex)) {
        currentHintIndex++;
        showNextHint();
        return;
    }
    
    var propDiv = document.querySelector('.scene-prop[data-id="' + currentHintIndex + '"]');
    if (!propDiv || propDiv.classList.contains('found')) {
        currentHintIndex++;
        showNextHint();
        return;
    }
    
    var hintEffect = document.createElement('div');
    hintEffect.className = 'hint-effect';
    propDiv.appendChild(hintEffect);
    
    hintTimeout = setTimeout(function() {
        if (hintEffect.parentNode) hintEffect.remove();
        currentHintIndex++;
        showNextHint();
    }, 3000);
}

function handleObjectClick(objectId) {
    if (foundObjects.has(objectId)) return;
    
    if (hintTimeout) {
        clearTimeout(hintTimeout);
        hintTimeout = null;
    }
    
    foundObjects.add(objectId);
    playClickSound();
    
    var propDiv = document.querySelector('.scene-prop[data-id="' + objectId + '"]');
    if (propDiv) {
        var hint = propDiv.querySelector('.hint-effect');
        if (hint) hint.remove();
        
        var clickEffect = document.createElement('div');
        clickEffect.className = 'click-effect';
        propDiv.appendChild(clickEffect);
        
        var starsEffect = document.createElement('div');
        starsEffect.className = 'stars-effect';
        starsEffect.textContent = '✨';
        propDiv.appendChild(starsEffect);
        
        setTimeout(function() { propDiv.classList.add('found'); }, 300);
    }
    
    var objectItem = document.querySelector('.object-item[data-id="' + objectId + '"]');
    if (objectItem) objectItem.classList.add('found');
    
    updateProgress();
    
    if (foundObjects.size === ITEMS.length) {
        setTimeout(function() { winScreen.classList.add('active'); }, 1000);
    } else {
        currentHintIndex++;
        showNextHint();
    }
}

function updateProgress() {
    var progress = (foundObjects.size / ITEMS.length) * 100;
    progressText.textContent = 'Found: ' + foundObjects.size + '/' + ITEMS.length;
    progressFill.style.width = progress + '%';
}

function resetGame() {
    foundObjects.clear();
    currentHintIndex = 0;
    if (hintTimeout) {
        clearTimeout(hintTimeout);
        hintTimeout = null;
    }
    updateProgress();
    document.querySelectorAll('.object-item').forEach(function(item) {
        item.classList.remove('found');
    });
    initGame();
}

window.mraid = window.mraid || {};
if (typeof mraid !== 'undefined') {
    if (mraid.getState() === 'loading') {
        mraid.addEventListener('ready', function() { console.log('MRAID ready'); });
    }
}

document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
document.addEventListener('touchmove', function(e) {
    if (e.touches.length > 1) e.preventDefault();
}, { passive: false });
</script>
</body>
</html>
