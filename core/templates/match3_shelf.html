<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>Playable Ad</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;touch-action:none;user-select:none;-webkit-user-select:none;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
body{background:linear-gradient(180deg,#f8f0e0 0%,#e8d5b8 100%)}
#app{position:relative;width:min(100vw,calc(100vh*9/16));height:min(100vh,calc(100vw*16/9));margin:0 auto;overflow:hidden;display:flex;flex-direction:column}
#topbar{height:48px;background:linear-gradient(180deg,#6b3a1f,#8b4f2d);display:flex;align-items:center;padding:0 12px;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.3);z-index:20}
#topbar .title{color:#ffe9a0;font-size:14px;font-weight:700;flex:1}
#progress{display:flex;align-items:center;gap:6px}
#counter{color:#fff;font-size:12px;font-weight:600;transition:color .2s}
#counter.danger{color:#ffd24a;animation:counterPulse .8s ease-in-out infinite}
@keyframes counterPulse{0%,100%{opacity:1}50%{opacity:.55}}
#pbar{width:60px;height:6px;background:rgba(0,0,0,.3);border-radius:3px;overflow:hidden}
#pfill{height:100%;background:linear-gradient(90deg,#4cef50,#8bc34a);width:0%;transition:width .3s;border-radius:3px}
#cta-top{background:linear-gradient(180deg,#ff6b35,#ff4500);color:#fff;border:none;border-radius:14px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer;margin-left:8px;box-shadow:0 2px 4px rgba(0,0,0,.2)}
#board-wrap{flex:1;position:relative;min-height:0;overflow:hidden}
#board-wrap.shake{animation:boardShake .43s cubic-bezier(.36,.07,.19,.97)}
@keyframes boardShake{0%,100%{transform:translate(0,0)}15%{transform:translate(-4px,2px)}30%{transform:translate(5px,-2px)}45%{transform:translate(-4px,3px)}60%{transform:translate(4px,-2px)}75%{transform:translate(-2px,1px)}}
#board{position:absolute;inset:0;display:grid;grid-template-columns:repeat({{COLS}},1fr);grid-template-rows:repeat({{ROWS}},1fr);gap:6px;padding:8px}
.cell{min-height:0;min-width:0;display:flex}
.shelf{flex:1;background:linear-gradient(180deg,#d4a574 0%,#b8875a 60%,#9a6b3a 100%);border-radius:8px;padding:4px;min-height:0;display:grid;grid-template-columns:repeat(3,1fr);align-items:end;gap:2px;position:relative;box-shadow:inset 0 1px 0 rgba(255,220,170,.3),inset 0 -4px 0 rgba(0,0,0,.15),0 2px 4px rgba(0,0,0,.15);transition:transform .12s,box-shadow .12s}
.shelf::after{content:"";position:absolute;left:4px;right:4px;bottom:4px;height:6px;background:linear-gradient(180deg,#c49560,#8b5e3a);border-radius:3px;box-shadow:0 1px 0 rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.15)}
.shelf.can-drop{box-shadow:inset 0 1px 0 rgba(255,220,170,.3),inset 0 -4px 0 rgba(0,0,0,.15),0 0 0 2px rgba(120,200,255,.45)}
.shelf.hint-source{box-shadow:inset 0 1px 0 rgba(255,220,170,.3),inset 0 -4px 0 rgba(0,0,0,.15),0 0 0 2px rgba(100,220,120,.7),0 0 12px rgba(100,220,120,.4)}
.shelf.hint-target{box-shadow:inset 0 1px 0 rgba(255,220,170,.3),inset 0 -4px 0 rgba(0,0,0,.15),0 0 0 2px rgba(255,220,100,.7),0 0 12px rgba(255,220,100,.4)}
.shelf.hover{transform:scale(1.03);box-shadow:inset 0 1px 0 rgba(255,220,170,.3),inset 0 -4px 0 rgba(0,0,0,.15),0 0 0 3px rgba(76,175,80,.8),0 0 16px rgba(76,175,80,.5)}
.shelf.drop-success{animation:dropOk .17s ease}
@keyframes dropOk{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
.shelf.drop-fail{animation:dropFail .26s ease}
@keyframes dropFail{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.shelf.clearing{animation:shelfClear .56s ease forwards;overflow:visible;z-index:10}
@keyframes shelfClear{0%{transform:scale(1)}28%{transform:scale(1.08)}100%{transform:scale(.85);opacity:0}}
.tile{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:clamp(20px,5vw,32px);cursor:grab;position:relative;z-index:2;border-radius:6px;background:rgba(255,255,255,.15);transition:transform .1s;touch-action:none;border:none}
.tile:active{transform:scale(.92);cursor:grabbing}
.tile.drag-origin{opacity:.28;transform:scale(.82)}
.tile img{width:80%;height:80%;object-fit:contain;pointer-events:none;filter:drop-shadow(0 2px 2px rgba(0,0,0,.2))}
.slot{width:100%;aspect-ratio:1;border-radius:6px;background:rgba(0,0,0,.06)}
.drag-ghost{position:fixed;left:0;top:0;width:72px;height:72px;pointer-events:none;z-index:9999;display:flex;align-items:center;justify-content:center;font-size:clamp(28px,7vw,44px);filter:drop-shadow(0 6px 10px rgba(0,0,0,.4));will-change:transform}
.drag-ghost img{width:78%;height:78%;object-fit:contain}
#hint-hand{position:absolute;width:34px;height:34px;display:none;place-items:center;font-size:30px;pointer-events:none;z-index:100;animation:handGuide 1.7s cubic-bezier(.25,.72,.25,1) infinite}
@keyframes handGuide{0%{transform:translate(-50%,-50%) scale(1)}18%{transform:translate(-50%,-50%) scale(.86)}50%{transform:translate(calc(-50% + var(--dx,0px)),calc(-50% + var(--dy,0px))) scale(.9)}82%{transform:translate(calc(-50% + var(--dx,0px)),calc(-50% + var(--dy,0px))) scale(.86)}100%{transform:translate(-50%,-50%) scale(1)}}
.shock-ring{position:absolute;left:50%;top:50%;width:20px;height:20px;border-radius:50%;border:3px solid rgba(255,246,180,.9);box-shadow:0 0 14px rgba(255,230,100,.7);transform:translate(-50%,-50%);animation:ringExp .5s ease-out forwards;pointer-events:none}
@keyframes ringExp{0%{transform:translate(-50%,-50%) scale(.3);opacity:1}100%{transform:translate(-50%,-50%) scale(4);opacity:0}}
.wood-chip{position:absolute;width:13px;height:8px;border-radius:2px;background:linear-gradient(180deg,#d59767,#8b4d2e);pointer-events:none;animation:chipFly var(--dur,460ms) ease-out forwards}
@keyframes chipFly{0%{opacity:1;transform:translate(0,0) scale(1) rotate(0)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.5) rotate(var(--rot))}}
.praise-text{position:absolute;left:50%;top:30%;transform:translate(-50%,-50%);color:#fff;font-size:clamp(16px,4.4vw,26px);font-weight:900;text-shadow:0 2px 0 #c4641a,0 0 10px rgba(255,200,80,.8);white-space:nowrap;pointer-events:none;animation:praisePop .9s ease-out forwards;z-index:11}
@keyframes praisePop{0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}25%{opacity:1;transform:translate(-50%,-90%) scale(1.1)}100%{opacity:0;transform:translate(-50%,-160%) scale(1)}}
#cta-bottom{height:44px;margin:6px 12px 8px;background:linear-gradient(135deg,#ff6b35,#ff4500);border:none;border-radius:22px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;flex-shrink:0;box-shadow:0 4px 12px rgba(255,69,0,.3);animation:pulse 2s ease-in-out infinite;z-index:20}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
#overlay{position:absolute;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(3px)}
#overlay.show{display:flex}
.end-card{background:#fff;border-radius:20px;padding:28px;text-align:center;width:80%;max-width:300px;box-shadow:0 20px 40px rgba(0,0,0,.3);animation:cardIn .35s cubic-bezier(.2,.8,.3,1.2)}
@keyframes cardIn{0%{opacity:0;transform:scale(.7) translateY(20px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.end-card h2{color:#333;font-size:22px;margin-bottom:8px}
.end-card p{color:#7a6a55;font-size:14px;margin-bottom:6px;line-height:1.4}
.end-card .stars{font-size:36px;margin:10px 0}
.end-card .btns{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.end-card button{border:none;border-radius:20px;padding:12px 32px;font-size:15px;font-weight:700;cursor:pointer}
.end-card .play{background:linear-gradient(180deg,#ff6b35,#ff4500);color:#fff;box-shadow:0 4px 12px rgba(255,69,0,.3)}
.end-card .retry{background:#efe4d4;color:#7a4519}
#start{position:absolute;inset:0;background:linear-gradient(180deg,rgba(40,22,10,.62),rgba(40,22,10,.82));display:flex;align-items:center;justify-content:center;z-index:150}
#start.hide{display:none}
.start-card{text-align:center;color:#fff;padding:24px;width:84%}
.start-card .logo{font-size:clamp(30px,8vw,52px);font-weight:900;color:#62df23;line-height:.95;text-shadow:-2px -2px 0 #ffec90,2px -2px 0 #ffec90,-2px 2px 0 #ffec90,2px 2px 0 #ffec90,0 6px 0 #7e441f}
.start-card .logo small{display:block;margin-top:8px;font-size:clamp(18px,4.2vw,30px);color:#ffb400;text-shadow:-1.5px -1.5px 0 #8f3f0e,1.5px -1.5px 0 #8f3f0e,-1.5px 1.5px 0 #8f3f0e,1.5px 1.5px 0 #8f3f0e}
.start-card .desc{margin:18px 0 22px;font-size:clamp(13px,3.4vw,17px);font-weight:600;line-height:1.5;color:#ffeccb}
.start-card .startBtn{border:none;border-radius:16px;padding:15px 44px;font-size:19px;font-weight:900;color:#fff;cursor:pointer;background:linear-gradient(180deg,#35c23e,#1d8f2f);box-shadow:0 6px 0 #156b24,0 10px 18px rgba(0,0,0,.3);animation:pulse 1.8s ease-in-out infinite}
</style>

<body>
<div id="app">
  <div id="topbar">
    <span class="title">Shelf Match</span>
    <div id="progress">
      <span id="counter">0 / {{GOAL}}</span>
      <div id="pbar"><div id="pfill"></div></div>
    </div>
    <button id="cta-top" onclick="openStore()">Download</button>
  </div>
  <div id="board-wrap">
    <div id="board"></div>
    <div id="hint-hand">👆</div>
  </div>
  <button id="cta-bottom" onclick="openStore()">Play Full Game Free!</button>
  <div id="overlay">
    <div class="end-card">
      <h2 id="ov-title">Well Done!</h2>
      <p id="ov-desc"></p>
      <div class="stars" id="ov-stars">⭐⭐⭐</div>
      <div class="btns">
        <button class="play" onclick="openStore()">Play Full Game</button>
        <button class="retry" id="retryBtn" style="display:none">Try Again</button>
      </div>
    </div>
  </div>
  <div id="start">
    <div class="start-card">
      <div class="logo">SHELF<small>MATCH 3</small></div>
      <div class="desc">Drag items onto a shelf.<br/>Collect 3 of a kind to clear it!</div>
      <button class="startBtn" id="startBtn">▶ PLAY</button>
    </div>
  </div>
</div>
<script>
const CLICK_URL="STORE_URL_PLACEHOLDER";
  function openStore() {
    try {
      if (window.mraid && typeof window.mraid.open === 'function') {
        window.mraid.open(CLICK_URL);
        return;
      }
    } catch (e) {}
    try {
      window.open(CLICK_URL, '_blank', 'noopener');
      return;
    } catch (e) {}
    window.location.href = CLICK_URL;
  }

(function(){
'use strict';
const COLS={{COLS}},ROWS={{ROWS}},MAX_TILE=3,GOAL={{GOAL}};
const IDLE_HINT_MS=4500;
const BREAK_ANIM_MS=560;
const DRAG_LERP=0.72,DRAG_STOP_EPS=0.12,HOVER_THROTTLE_MS=16;
const DROP_SNAP_MS=46,FAIL_BOUNCE_MS=82;
const PRAISE_WORDS=['Good','Great','Excellent','Amazing'];

const TILE_DATA=/*{{TILE_DATA}}*/null;

const EMOJI_TYPES=['🥕','🍊','🥤','🍓','🫐','🍉','🥔','🧁','🍋'];
const NUM_TYPES=TILE_DATA?TILE_DATA.length:Math.min(9,EMOJI_TYPES.length);

let board=[];
let clearCount=0;
let gameOver=false;
let started=false;
let openedStore=false;
let drag=null;
let idleTimer=null;
let dragRafId=0;
let shelfHitCache=[];
let hintSourceEl=null,hintTargetEl=null;
let audioCtx=null;

const boardEl=document.getElementById('board');
const boardWrapEl=document.getElementById('board-wrap');
const counterEl=document.getElementById('counter');
const pfillEl=document.getElementById('pfill');
const handEl=document.getElementById('hint-hand');
const overlayEl=document.getElementById('overlay');
const ovTitleEl=document.getElementById('ov-title');
const ovDescEl=document.getElementById('ov-desc');
const ovStarsEl=document.getElementById('ov-stars');
const startEl=document.getElementById('start');
const startBtn=document.getElementById('startBtn');
const retryBtn=document.getElementById('retryBtn');

/* ---------- audio ---------- */
function aud(){
  if(!audioCtx){const C=window.AudioContext||window.webkitAudioContext;if(!C)return null;audioCtx=new C()}
  if(audioCtx.state==='suspended'){try{audioCtx.resume()}catch(e){}}
  return audioCtx;
}
function note(freq,dur,vol,wave,at){
  const c=aud();if(!c)return;
  const t0=at||c.currentTime;
  const o=c.createOscillator(),g=c.createGain();
  o.type=wave||'sine';o.frequency.setValueAtTime(freq,t0);
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(Math.max(0.0001,vol||.12),t0+0.015);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g).connect(c.destination);o.start(t0);o.stop(t0+dur+0.02);
}
function sfxPlace(){note(600,.06,.12,'sine')}
function sfxClear(){const c=aud();if(!c)return;const t=c.currentTime+0.01;note(740,.08,.07,'square',t);note(980,.1,.06,'triangle',t+.07);note(1320,.14,.06,'triangle',t+.14)}
function sfxWin(){[523,659,784,1047].forEach((f,i)=>note(f,.2,.1,'triangle',(aud()?aud().currentTime:0)+i*.1))}
function speakPraise(word){
  if(!word||!('speechSynthesis'in window)||typeof window.SpeechSynthesisUtterance!=='function')return;
  try{const u=new SpeechSynthesisUtterance(word);u.lang='en-US';u.rate=1.05;u.pitch=1.15;u.volume=1;window.speechSynthesis.cancel();window.speechSynthesis.speak(u)}catch(e){}
}

/* ---------- helpers ---------- */
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function randType(){return Math.floor(Math.random()*NUM_TYPES)}
function tileHTML(t){return TILE_DATA?'<img src="'+TILE_DATA[t]+'" alt=""/>':EMOJI_TYPES[t]}
function isClearable(tiles){return tiles.length===MAX_TILE&&tiles[0]===tiles[1]&&tiles[1]===tiles[2]}

function initBoard(){
  board=[];
  for(let c=0;c<COLS;c++){
    board[c]=[];
    for(let r=0;r<ROWS;r++){
      const count=Math.random()<0.6?2:3;
      const tiles=[];
      for(let i=0;i<count;i++)tiles.push(randType());
      if(isClearable(tiles))tiles[2]=(tiles[2]+1)%NUM_TYPES;
      board[c][r]={tiles};
    }
  }
}

function renderBoard(){
  clearHintVisuals();
  boardEl.innerHTML='';
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const shelf=board[c][r];
      const cell=document.createElement('div');
      cell.className='cell';
      const el=document.createElement('div');
      el.className='shelf';
      el.dataset.col=c;el.dataset.row=r;
      for(let i=0;i<MAX_TILE;i++){
        if(i<shelf.tiles.length){
          const t=document.createElement('button');
          t.type='button';t.className='tile';
          t.dataset.col=c;t.dataset.row=r;t.dataset.idx=i;t.dataset.type=shelf.tiles[i];
          t.innerHTML=tileHTML(shelf.tiles[i]);
          t.addEventListener('pointerdown',onTileDown);
          el.appendChild(t);
        }else{
          const s=document.createElement('div');s.className='slot';el.appendChild(s);
        }
      }
      cell.appendChild(el);
      boardEl.appendChild(cell);
    }
  }
  rebuildShelfHitCache();
}

function shelfElAt(col,row){return boardEl.querySelector('.shelf[data-col="'+col+'"][data-row="'+row+'"]')}

function rebuildShelfHitCache(){
  shelfHitCache=[];
  boardEl.querySelectorAll('.shelf').forEach(el=>{
    const col=+el.dataset.col,row=+el.dataset.row;
    const rc=el.getBoundingClientRect();
    shelfHitCache.push({el,col,row,left:rc.left,right:rc.right,top:rc.top,bottom:rc.bottom,dropX:rc.left+rc.width*.5,dropY:rc.top+rc.height*.6});
  });
}

function shelfFromPoint(x,y){
  for(let i=shelfHitCache.length-1;i>=0;i--){
    const c=shelfHitCache[i];
    if(x>=c.left&&x<=c.right&&y>=c.top&&y<=c.bottom)return c;
  }
  return null;
}

function updateHud(){
  counterEl.textContent=clearCount+' / '+GOAL;
  pfillEl.style.width=Math.min(100,(clearCount/GOAL)*100)+'%';
  counterEl.className=(clearCount>=GOAL||hasValidMove())?'':'danger';
}

/* ---------- drag ---------- */
function applyGhost(g,x,y,scale,rot){
  if(!g)return;
  g.style.transform='translate3d('+(x-36)+'px,'+(y-36)+'px,0) scale('+(scale||1)+') rotate('+(rot||0)+'deg)';
}
function stopDragLoop(){if(dragRafId){cancelAnimationFrame(dragRafId);dragRafId=0}}
function startDragLoop(){
  stopDragLoop();
  const tick=()=>{
    if(!drag||!drag.ghost){dragRafId=0;return}
    const dx=drag.pointerX-drag.ghostX,dy=drag.pointerY-drag.ghostY;
    const dist=Math.hypot(dx,dy);
    const lerp=clamp(DRAG_LERP+dist*0.012,DRAG_LERP,0.965);
    drag.ghostX=Math.abs(dx)<DRAG_STOP_EPS?drag.pointerX:(drag.ghostX+dx*lerp);
    drag.ghostY=Math.abs(dy)<DRAG_STOP_EPS?drag.pointerY:(drag.ghostY+dy*lerp);
    drag.tilt+=(drag.targetTilt-drag.tilt)*0.42;
    applyGhost(drag.ghost,drag.ghostX,drag.ghostY,1.015,drag.tilt);
    dragRafId=requestAnimationFrame(tick);
  };
  dragRafId=requestAnimationFrame(tick);
}
function easeOutCubic(t){return 1-Math.pow(1-t,3)}
function animateGhost(g,o){
  if(!drag||!drag.ghost)return Promise.resolve();
  const fromX=drag.ghostX,fromY=drag.ghostY;
  const toX=isFinite(o.toX)?o.toX:fromX,toY=isFinite(o.toY)?o.toY:fromY;
  const fromS=isFinite(o.fromScale)?o.fromScale:1.015,toS=isFinite(o.toScale)?o.toScale:1;
  const fromR=isFinite(o.fromRot)?o.fromRot:(drag.tilt||0),toR=isFinite(o.toRot)?o.toRot:0;
  const dur=Math.max(16,o.duration||56);
  return new Promise(res=>{
    const start=performance.now();
    const step=now=>{
      if(!drag||!drag.ghost||!drag.ghost.isConnected){res();return}
      const raw=(now-start)/dur,t=raw<=0?0:(raw>=1?1:raw),k=easeOutCubic(t);
      const x=fromX+(toX-fromX)*k,y=fromY+(toY-fromY)*k;
      drag.ghostX=x;drag.ghostY=y;
      applyGhost(drag.ghost,x,y,fromS+(toS-fromS)*k,fromR+(toR-fromR)*k);
      if(t<1)requestAnimationFrame(step);else res();
    };
    requestAnimationFrame(step);
  });
}

function setDropHints(sc,sr){
  boardEl.querySelectorAll('.shelf').forEach(el=>{
    const c=+el.dataset.col,r=+el.dataset.row,s=board[c][r];
    if(!(c===sc&&r===sr)&&s.tiles.length<MAX_TILE)el.classList.add('can-drop');
  });
}
function clearDropHints(){boardEl.querySelectorAll('.shelf').forEach(el=>el.classList.remove('can-drop','hover'))}

function onTileDown(e){
  if(gameOver||drag)return;
  e.preventDefault();
  markActivity();
  const tileEl=e.currentTarget;
  const col=+tileEl.dataset.col,row=+tileEl.dataset.row,idx=+tileEl.dataset.idx,type=+tileEl.dataset.type;
  tileEl.classList.add('drag-origin');

  const ghost=document.createElement('div');
  ghost.className='drag-ghost';
  ghost.innerHTML=tileHTML(type);
  document.body.appendChild(ghost);

  drag={col,row,idx,type,tileEl,shelfEl:tileEl.parentElement,ghost,hoverEl:null,hoverMeta:null,
    pointerX:e.clientX,pointerY:e.clientY,ghostX:e.clientX,ghostY:e.clientY,tilt:0,targetTilt:0,lastHover:0};
  applyGhost(ghost,e.clientX,e.clientY,1.015,0);
  setDropHints(col,row);
  startDragLoop();

  window.addEventListener('pointermove',onDragMove,{passive:true});
  window.addEventListener('pointerup',onDragEnd,{once:true});
  window.addEventListener('pointercancel',onDragEnd,{once:true});
}

function onDragMove(e){
  if(!drag)return;
  const px=drag.pointerX;
  drag.pointerX=e.clientX;drag.pointerY=e.clientY;
  drag.targetTilt=clamp((e.clientX-px)*0.08,-3.2,3.2);
  const now=performance.now();
  if(now-drag.lastHover<HOVER_THROTTLE_MS)return;
  drag.lastHover=now;
  if(drag.hoverEl)drag.hoverEl.classList.remove('hover');
  const hit=shelfFromPoint(e.clientX,e.clientY);
  if(hit&&!(hit.col===drag.col&&hit.row===drag.row)&&board[hit.col][hit.row].tiles.length<MAX_TILE){
    hit.el.classList.add('hover');drag.hoverEl=hit.el;drag.hoverMeta=hit;
  }else{drag.hoverEl=null;drag.hoverMeta=null}
}

async function onDragEnd(e){
  window.removeEventListener('pointermove',onDragMove);
  if(!drag){clearDropHints();return}
  stopDragLoop();
  const d=drag;
  if(d.hoverEl)d.hoverEl.classList.remove('hover');
  const ex=e&&isFinite(e.clientX)?e.clientX:d.pointerX;
  const ey=e&&isFinite(e.clientY)?e.clientY:d.pointerY;

  let hit=d.hoverMeta;
  if(!(hit&&ex>=hit.left&&ex<=hit.right&&ey>=hit.top&&ey<=hit.bottom))hit=shelfFromPoint(ex,ey);

  let moved=false,cleared=false,cc=-1,cr=-1;
  if(hit){
    const src=board[d.col][d.row],tgt=board[hit.col][hit.row];
    const valid=src&&tgt&&!(hit.col===d.col&&hit.row===d.row)&&tgt.tiles.length<MAX_TILE&&src.tiles[d.idx]!==undefined;
    if(valid){
      await animateGhost(d.ghost,{toX:hit.dropX,toY:hit.dropY,toScale:.99,toRot:0,duration:DROP_SNAP_MS});
      const t=src.tiles.splice(d.idx,1)[0];
      tgt.tiles.push(t);
      moved=true;sfxPlace();
      pulse(hit.el,'drop-success',170);
      if(isClearable(tgt.tiles)){cleared=true;cc=hit.col;cr=hit.row}
    }
  }
  if(!moved){
    const rc=(d.tileEl&&d.tileEl.getBoundingClientRect())||d.shelfEl.getBoundingClientRect();
    await animateGhost(d.ghost,{toX:rc.left+rc.width/2,toY:rc.top+rc.height/2,fromScale:.97,toScale:1,fromRot:-4,toRot:0,duration:FAIL_BOUNCE_MS});
    pulse(d.shelfEl,'drop-fail',260);
  }
  if(d.tileEl)d.tileEl.classList.remove('drag-origin');
  if(d.ghost&&d.ghost.parentNode)d.ghost.parentNode.removeChild(d.ghost);
  drag=null;
  clearDropHints();

  if(moved){
    if(cleared){
      renderBoard();
      await playClearAnim(cc,cr);
      board[cc][cr].tiles=[];
      const cnt=Math.floor(Math.random()*2)+1;
      for(let i=0;i<cnt;i++)board[cc][cr].tiles.push(randType());
      if(isClearable(board[cc][cr].tiles))board[cc][cr].tiles[2]=(board[cc][cr].tiles[2]+1)%NUM_TYPES;
      clearCount++;
    }
    updateHud();
    if(clearCount>=GOAL){onWin();renderBoard();return}
    renderBoard();
    if(!hasValidMove()){onFail();return}
    scheduleIdleHint();
  }else{
    renderBoard();
    scheduleIdleHint();
  }
}

function pulse(el,cls,dur){if(!el)return;el.classList.remove(cls);el.classList.add(cls);setTimeout(()=>el.classList.remove(cls),dur||220)}

function playClearAnim(col,row){
  const shelfEl=shelfElAt(col,row);
  if(!shelfEl)return Promise.resolve();
  sfxClear();
  shelfEl.classList.add('clearing');
  boardWrapEl.classList.add('shake');
  setTimeout(()=>boardWrapEl.classList.remove('shake'),430);

  const word=PRAISE_WORDS[Math.floor(Math.random()*PRAISE_WORDS.length)];
  const praise=document.createElement('div');
  praise.className='praise-text';praise.textContent=word+'!';
  shelfEl.appendChild(praise);
  speakPraise(word);

  const ring=document.createElement('i');ring.className='shock-ring';shelfEl.appendChild(ring);
  for(let i=0;i<22;i++){
    const chip=document.createElement('i');chip.className='wood-chip';
    chip.style.setProperty('--dx',(Math.random()*180-90).toFixed(0)+'px');
    chip.style.setProperty('--dy',(Math.random()*-150-30).toFixed(0)+'px');
    chip.style.setProperty('--rot',(Math.random()*920-460).toFixed(0)+'deg');
    chip.style.setProperty('--dur',(360+Math.random()*220).toFixed(0)+'ms');
    chip.style.left=(18+Math.random()*64).toFixed(1)+'%';
    chip.style.top=(36+Math.random()*40).toFixed(1)+'%';
    shelfEl.appendChild(chip);
  }
  return new Promise(res=>setTimeout(res,BREAK_ANIM_MS));
}

/* ---------- valid-move + hints ---------- */
function hasValidMove(){
  let hasSource=false,hasTarget=false;
  for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++){
    const s=board[c][r];
    if(s.tiles.length>0)hasSource=true;
    if(s.tiles.length<MAX_TILE)hasTarget=true;
  }
  return hasSource&&hasTarget;
}
function findHintMove(){
  for(let tc=0;tc<COLS;tc++)for(let tr=0;tr<ROWS;tr++){
    const tgt=board[tc][tr];
    if(tgt.tiles.length<MAX_TILE){
      for(let sc=0;sc<COLS;sc++)for(let sr=0;sr<ROWS;sr++){
        if(sc===tc&&sr===tr)continue;
        const src=board[sc][sr];
        for(let i=src.tiles.length-1;i>=0;i--){
          const sim=tgt.tiles.concat([src.tiles[i]]);
          if(isClearable(sim))return{sc,sr,si:i,tc,tr};
        }
      }
    }
  }
  // fallback: any legal move
  for(let sc=0;sc<COLS;sc++)for(let sr=0;sr<ROWS;sr++){
    if(board[sc][sr].tiles.length===0)continue;
    for(let tc=0;tc<COLS;tc++)for(let tr=0;tr<ROWS;tr++){
      if(sc===tc&&sr===tr)continue;
      if(board[tc][tr].tiles.length<MAX_TILE)return{sc,sr,si:board[sc][sr].tiles.length-1,tc,tr};
    }
  }
  return null;
}
function clearHintVisuals(){
  if(hintSourceEl)hintSourceEl.classList.remove('hint-source');
  if(hintTargetEl)hintTargetEl.classList.remove('hint-target');
  hintSourceEl=hintTargetEl=null;
}
function hideHint(){clearHintVisuals();handEl.style.display='none'}
function showHint(){
  if(gameOver||drag)return;
  const m=findHintMove();if(!m)return;
  hideHint();
  const srcEl=shelfElAt(m.sc,m.sr),tgtEl=shelfElAt(m.tc,m.tr);
  if(!srcEl||!tgtEl)return;
  const host=boardWrapEl.getBoundingClientRect();
  const sr=srcEl.getBoundingClientRect(),tr=tgtEl.getBoundingClientRect();
  const sx=sr.left-host.left+sr.width*.5,sy=sr.top-host.top+sr.height*.55;
  const tx=tr.left-host.left+tr.width*.5,ty=tr.top-host.top+tr.height*.55;
  handEl.style.left=sx+'px';handEl.style.top=sy+'px';
  handEl.style.setProperty('--dx',(tx-sx).toFixed(1)+'px');
  handEl.style.setProperty('--dy',(ty-sy).toFixed(1)+'px');
  handEl.style.display='grid';
  srcEl.classList.add('hint-source');tgtEl.classList.add('hint-target');
  hintSourceEl=srcEl;hintTargetEl=tgtEl;
}
function scheduleIdleHint(){clearTimeout(idleTimer);if(gameOver)return;idleTimer=setTimeout(showHint,IDLE_HINT_MS)}
function markActivity(){hideHint();aud();scheduleIdleHint()}

/* ---------- end states ---------- */
function showOverlay(title,desc,stars,retry){
  ovTitleEl.textContent=title;
  ovDescEl.textContent=desc||'';
  ovStarsEl.style.display=stars?'block':'none';
  retryBtn.style.display=retry?'block':'none';
  overlayEl.classList.add('show');
}
function onWin(){
  if(gameOver)return;gameOver=true;clearTimeout(idleTimer);hideHint();
  setTimeout(()=>{showOverlay('Well Done!','You cleared '+GOAL+' shelves!',true,false);sfxWin()},320);
}
function onFail(){
  if(gameOver)return;gameOver=true;clearTimeout(idleTimer);hideHint();
  showOverlay('No Moves Left','Try again or play the full game!',false,true);
}
function resetGame(){
  gameOver=false;clearCount=0;clearTimeout(idleTimer);
  overlayEl.classList.remove('show');hideHint();
  initBoard();renderBoard();updateHud();scheduleIdleHint();
  setTimeout(showHint,1200);
}

retryBtn.addEventListener('click',()=>{markActivity();resetGame()});
startBtn.addEventListener('click',()=>{
  if(started)return;started=true;
  startEl.classList.add('hide');
  aud();
  resetGame();
});
window.addEventListener('resize',()=>setTimeout(rebuildShelfHitCache,0));

// Build board behind the start screen so layout is ready
initBoard();
renderBoard();
updateHud();
})();
</script>
