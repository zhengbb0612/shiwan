<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:#c9dff6;font-family:sans-serif}
#board{position:fixed;inset:0;background:#c9dff6}
.pc{position:absolute;cursor:grab;filter:drop-shadow(3px 4px 6px rgba(0,0,0,0.3));transition:filter .2s}
.pc:active{cursor:grabbing}
.pc.drag{z-index:9999!important;filter:drop-shadow(5px 8px 12px rgba(0,0,0,0.45));transform:scale(1.04)}
.pc.ok{cursor:default;pointer-events:none;filter:drop-shadow(1px 1px 2px rgba(0,0,0,0.15))}
#ov{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:20000;opacity:0;transition:opacity .5s}
#ov.s{display:flex;opacity:1}
#ov img{max-width:80vmin;max-height:60vh;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.5);margin-bottom:16px}
#ov h2{color:#FFD700;font-size:22px;margin-bottom:12px}
.btn{padding:11px 34px;background:linear-gradient(135deg,#00a173,#00d98b);color:#fff;font-size:16px;font-weight:bold;border:none;border-radius:50px;cursor:pointer;text-transform:uppercase}
#cta{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:99999}
#prog{position:fixed;top:10px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(0,0,0,.45);background:rgba(255,255,255,.6);padding:3px 10px;border-radius:8px;z-index:9999}
#msg{position:fixed;bottom:60px;left:50%;transform:translateX(-50%) translateY(30px);padding:5px 14px;background:rgba(76,175,80,.9);color:#fff;font-size:13px;font-weight:bold;border-radius:12px;z-index:20000;opacity:0;transition:all .3s;pointer-events:none}
#msg.s{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes hintPulse{0%,100%{transform:scale(1);filter:drop-shadow(3px 4px 6px rgba(0,0,0,.3))}50%{transform:scale(1.06);filter:drop-shadow(0 0 12px rgba(255,200,0,.7))}}
@keyframes handBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
function playSnap(){try{const d=.12,sr=audioCtx.sampleRate,b=audioCtx.createBuffer(1,sr*d,sr),a=b.getChannelData(0);for(let i=0;i<a.length;i++){const t=i/sr;a[i]=Math.exp(-t*45)*Math.sin(6.28*3200*t)*.3+Math.exp(-t*30)*Math.sin(6.28*1800*t)*.25+Math.exp(-t*55)*Math.sin(6.28*5000*t)*.15;}const s=audioCtx.createBufferSource();s.buffer=b;const g=audioCtx.createGain();g.gain.value=.75;s.connect(g);g.connect(audioCtx.destination);s.start();}catch(e){}}

let bgmStarted=false,bgmEl=null;
function startBGM(){
  if(bgmStarted)return;bgmStarted=true;
  try{
    bgmEl=document.getElementById('bgm');
    if(bgmEl){bgmEl.volume=0.3;bgmEl.play().catch(e=>{});}
  }catch(e){}
}

const syn=window.speechSynthesis,WW=["Great!","Good!","Excellent!","Amazing!","Perfect!","Brilliant!","Superb!","Fantastic!","Wonderful!","Incredible!"];
let wi=0;
function spk(){if(!syn)return;try{syn.cancel();const u=new SpeechSynthesisUtterance(WW[wi++%WW.length]);u.lang="en-US";u.pitch=.85;u.rate=1;const v=syn.getVoices().find(x=>x.lang.startsWith("en")&&(x.name.toLowerCase().includes("male")||x.name.toLowerCase().includes("david")));if(v)u.voice=v;syn.speak(u);}catch(e){}}
if(syn)syn.getVoices();

let hintTimer=null,hintHand=null,hintRunning=false;
function resetHint(){
  clearTimeout(hintTimer);
  clearHint();
  hintTimer=setTimeout(showHint,5000);
}
function clearHint(){
  if(hintHand){hintHand.remove();hintHand=null;}
  hintRunning=false;
  pcs.forEach(p=>p.el.style.animation='');
}
function showHint(){
  const unplaced=pcs.filter(p=>!p.ok);
  if(unplaced.length===0)return;
  hintRunning=true;
  const target=unplaced[Math.floor(Math.random()*unplaced.length)];
  target.el.style.animation='hintPulse 1.2s ease-in-out infinite';
  if(hintHand)hintHand.remove();
  hintHand=document.createElement('div');
  hintHand.innerHTML='👆';
  const fromX=target.x+target.el.offsetWidth/2-18;
  const fromY=target.y+target.el.offsetHeight/2+10;
  const toX=target.cx+target.el.offsetWidth/2-18;
  const toY=target.cy+target.el.offsetHeight/2+10;
  hintHand.style.cssText=`position:fixed;font-size:36px;z-index:99998;pointer-events:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4));left:${fromX}px;top:${fromY}px;transition:left 1.2s ease-in-out,top 1.2s ease-in-out`;
  document.body.appendChild(hintHand);
  function animateHand(){
    if(!hintRunning)return;
    hintHand.style.left=fromX+'px';hintHand.style.top=fromY+'px';
    hintHand.style.transition='none';
    setTimeout(()=>{
      if(!hintRunning)return;
      hintHand.style.transition='left 1.2s ease-in-out,top 1.2s ease-in-out';
      hintHand.style.left=toX+'px';hintHand.style.top=toY+'px';
    },200);
    setTimeout(()=>{if(hintRunning)animateHand();},2000);
  }
  animateHand();
  setTimeout(clearHint,6000);
}

function spawnWeld(el){
  const rect=el.getBoundingClientRect();
  for(let i=0;i<8;i++){
    const s=document.createElement('div');
    const side=Math.floor(Math.random()*4);
    let sx,sy;
    if(side===0){sx=rect.left+Math.random()*rect.width;sy=rect.top;}
    else if(side===1){sx=rect.right;sy=rect.top+Math.random()*rect.height;}
    else if(side===2){sx=rect.left+Math.random()*rect.width;sy=rect.bottom;}
    else{sx=rect.left;sy=rect.top+Math.random()*rect.height;}
    const size=2+Math.random()*3;
    const colors=['#FFF','#FFD700','#FFA'];
    s.style.cssText=`position:fixed;left:${sx-size/2}px;top:${sy-size/2}px;width:${size}px;height:${size}px;background:${colors[i%3]};border-radius:50%;z-index:99997;pointer-events:none;box-shadow:0 0 4px ${colors[i%3]};opacity:1;transition:opacity .35s`;
    document.body.appendChild(s);
    setTimeout(()=>{s.style.opacity='0';},50+Math.random()*100);
    setTimeout(()=>s.remove(),400);
  }
  el.style.filter='drop-shadow(0 0 8px rgba(255,255,200,0.8))';
  setTimeout(()=>{el.style.filter=el.classList.contains('ok')?'drop-shadow(1px 1px 2px rgba(0,0,0,.15))':'drop-shadow(3px 4px 6px rgba(0,0,0,.3))';},250);
}

let pcs=[],done=0;
function init(){
  const img=new Image();
  img.onload=function(){
    const vw=window.innerWidth,vh=window.innerHeight;
    const ratio=img.naturalWidth/img.naturalHeight;
    let bh=vh*.78,bw=bh*ratio;
    if(bw>vw*.88){bw=vw*.88;bh=bw/ratio;}
    const bx=(vw-bw)/2,by=(vh-bh)/2-5;
    const sx=bw/500,sy=bh/750;

    const ns='http://www.w3.org/2000/svg';
    PD.forEach((d,idx)=>{
      const svg=document.createElementNS(ns,'svg');
      const cw=500/COLS,ch=750/ROWS;
      const pad=6;
      const vbx=d.col*cw-pad, vby=d.row*ch-pad;
      const vbw=cw+pad*2, vbh=ch+pad*2;
      const elW=vbw*sx, elH=vbh*sy;

      svg.setAttribute('width',elW);svg.setAttribute('height',elH);
      svg.setAttribute('viewBox',`${vbx} ${vby} ${vbw} ${vbh}`);
      svg.setAttribute('overflow','visible');
      svg.innerHTML=`<defs><clipPath id="c${idx}"><path d="${d.path}"/></clipPath></defs>`+
        `<g clip-path="url(#c${idx})"><image href="${IMG}" x="0" y="0" width="500" height="750" preserveAspectRatio="none"/></g>`+
        `<path d="${d.path}" fill="none" stroke="rgba(100,65,15,0.6)" stroke-width="2.0" stroke-linejoin="round"/>`;

      const el=document.createElement('div');
      el.className='pc';
      el.style.width=elW+'px';el.style.height=elH+'px';
      el.appendChild(svg);
      document.getElementById('board').appendChild(el);

      const cx=bx+(d.col*cw-pad)*sx;
      const cy=by+(d.row*ch-pad)*sy;

      const dispGap=3;
      const dispCw=elW+dispGap, dispCh=elH+dispGap;
      const totalDW=COLS*dispCw, totalDH=ROWS*dispCh;
      const offX=(vw-totalDW)/2, offY=(vh-totalDH)/2;
      const startX=offX+d.col*dispCw, startY=offY+d.row*dispCh;

      el.style.left=startX+'px';el.style.top=startY+'px';
      el.style.zIndex=idx+2;
      pcs.push({el,idx,cx,cy,x:startX,y:startY,ok:false});
    });

    const pos=pcs.map(p=>({x:p.x,y:p.y}));
    for(let i=pos.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pos[i],pos[j]]=[pos[j],pos[i]];}
    pcs.forEach((p,i)=>{p.el.style.left=pos[i].x+'px';p.el.style.top=pos[i].y+'px';p.x=pos[i].x;p.y=pos[i].y;});

    pcs.forEach(p=>drag(p));
    upd();
    resetHint();
  };
  img.src=IMG;
}

function drag(p){
  let ox,oy,on=0;
  function s(e){if(p.ok)return;e.preventDefault();const t=e.touches?e.touches[0]:e;const r=p.el.getBoundingClientRect();ox=t.clientX-r.left;oy=t.clientY-r.top;on=1;p.el.classList.add('drag');p.el.style.zIndex=9999;if(audioCtx.state==='suspended')audioCtx.resume();clearHint();resetHint();if(!bgmStarted)startBGM();}
  function m(e){if(!on)return;e.preventDefault();const t=e.touches?e.touches[0]:e;p.x=t.clientX-ox;p.y=t.clientY-oy;p.el.style.left=p.x+'px';p.el.style.top=p.y+'px';}
  function u(){if(!on)return;on=0;p.el.classList.remove('drag');
    if(Math.hypot(p.x-p.cx,p.y-p.cy)<SNAP){
      p.el.style.transition='left .1s,top .1s';p.el.style.left=p.cx+'px';p.el.style.top=p.cy+'px';
      setTimeout(()=>p.el.style.transition='',120);
      p.ok=1;p.el.classList.add('ok');p.el.style.zIndex=1;done++;
      playSnap();spk();upd();resetHint();
      showMsg(WW[(wi>0?wi-1:0)%WW.length]);
      spawnWeld(p.el);
      if(done>=TOTAL)setTimeout(()=>document.getElementById('ov').classList.add('s'),500);
    }else p.el.style.zIndex=Math.floor(Math.random()*20)+3;
  }
  p.el.addEventListener('mousedown',s);p.el.addEventListener('touchstart',s,{passive:false});
  document.addEventListener('mousemove',m);document.addEventListener('touchmove',m,{passive:false});
  document.addEventListener('mouseup',u);document.addEventListener('touchend',u);
}
function upd(){document.getElementById('prog').textContent=done+'/24';}
function showMsg(t){const m=document.getElementById('msg');m.textContent=t;m.classList.add('s');setTimeout(()=>m.classList.remove('s'),1200);}
document.getElementById('cta').addEventListener('click',go);
document.getElementById('ov').addEventListener('click',go);
window.addEventListener('load',function(){init();});
document.addEventListener('visibilitychange',function(){if(document.hidden&&audioCtx.state==='running')audioCtx.suspend();else audioCtx.resume();});
(function(){function f(){var w=window.innerWidth||screen.width,h=window.innerHeight||screen.height;document.documentElement.style.cssText='width:'+w+'px;height:'+h+'px';document.body.style.cssText='width:'+w+'px;height:'+h+'px';}f();window.addEventListener('resize',f);[0,100,300,1000].forEach(function(t){setTimeout(f,t);});})();
</script></body></html>
