<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<!-- UAC_META_PLACEHOLDER -->
<title>Find the Differences</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#10151f;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,"PingFang SC","Microsoft YaHei",sans-serif;touch-action:manipulation;-webkit-user-select:none;user-select:none}
#app{position:relative;width:min(100vw,calc(100vh * 9 / 16));height:min(100vh,calc(100vw * 16 / 9));aspect-ratio:9/16;margin:0 auto;overflow:hidden;background:radial-gradient(120% 80% at 50% 12%,#243349 0%,#172033 50%,#0e131d 100%)}
#hud{position:absolute;left:0;right:0;top:0;padding:max(env(safe-area-inset-top),10px) 14px 6px;display:flex;justify-content:space-between;align-items:center;gap:8px;z-index:20}
.pill{height:40px;border-radius:20px;padding:0 16px;display:flex;align-items:center;justify-content:center;gap:7px;background:linear-gradient(180deg,rgba(54,82,128,.95),rgba(28,44,72,.96));box-shadow:0 6px 16px rgba(0,0,0,.32),inset 0 1px 0 rgba(180,210,255,.3);border:1px solid rgba(150,190,255,.2);color:#eaf2ff;font-weight:800;font-size:15px}
.pill b{font-size:18px}
.toptip{position:absolute;left:50%;top:8.5%;transform:translateX(-50%);width:90%;text-align:center;color:#dce8ff;font-weight:900;font-size:min(4.6vw,21px);z-index:18;text-shadow:0 2px 6px rgba(0,0,0,.55)}
/* stacked image panels */
#stack{position:absolute;left:3%;right:3%;top:13.5%;bottom:11%;display:flex;flex-direction:column;gap:2.2%;z-index:10}
.panel{position:relative;flex:1;border-radius:16px;overflow:hidden;background:#0a0f17;box-shadow:0 8px 22px rgba(0,0,0,.4),inset 0 0 0 2px rgba(150,190,255,.18)}
.imgbox{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)}
.imgbox img{display:block;width:100%;height:100%;object-fit:contain;pointer-events:none}
.mark{position:absolute;border:3px solid #46e07a;border-radius:50%;box-shadow:0 0 12px rgba(70,224,122,.85);transform:translate(-50%,-50%) scale(0);pointer-events:none;animation:markIn .3s ease forwards;z-index:5}
@keyframes markIn{0%{transform:translate(-50%,-50%) scale(0)}60%{transform:translate(-50%,-50%) scale(1.25)}100%{transform:translate(-50%,-50%) scale(1)}}
.miss{position:absolute;width:30px;height:30px;border-radius:50%;color:#ff5a5a;font-weight:900;font-size:26px;display:flex;align-items:center;justify-content:center;transform:translate(-50%,-50%);pointer-events:none;animation:missF .5s ease forwards;z-index:5}
@keyframes missF{0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}100%{opacity:0;transform:translate(-50%,-70%) scale(1)}}
/* panel label badge */
.plabel{position:absolute;left:8px;top:8px;padding:3px 10px;border-radius:10px;background:rgba(12,18,30,.66);color:#bcd6ff;font-size:11px;font-weight:800;letter-spacing:.5px;z-index:7;pointer-events:none;box-shadow:inset 0 0 0 1px rgba(150,190,255,.18)}
/* tutorial hand + ripple (first-time guidance) */
.hand{position:absolute;width:46px;height:46px;left:0;top:0;transform:translate(-30%,-20%);z-index:9;pointer-events:none;filter:drop-shadow(0 3px 5px rgba(0,0,0,.5));opacity:0}
.hand.show{animation:handTap 1.4s ease-in-out infinite}
@keyframes handTap{0%{opacity:1;transform:translate(-30%,-20%) scale(1)}45%{opacity:1;transform:translate(-30%,-20%) scale(.82)}70%{opacity:1;transform:translate(-30%,-20%) scale(1)}100%{opacity:1;transform:translate(-30%,-20%) scale(1)}}
.ripple{position:absolute;width:34px;height:34px;border-radius:50%;border:3px solid rgba(95,232,138,.9);transform:translate(-50%,-50%) scale(.3);z-index:8;pointer-events:none;opacity:0}
.ripple.show{animation:rippleP 1.4s ease-out infinite}
@keyframes rippleP{0%{opacity:.9;transform:translate(-50%,-50%) scale(.3)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.5)}}
/* dots progress */
#dots{position:absolute;left:50%;bottom:6.5%;transform:translateX(-50%);display:flex;gap:8px;z-index:18}
.dot{width:13px;height:13px;border-radius:50%;background:rgba(255,255,255,.22);box-shadow:inset 0 1px 2px rgba(0,0,0,.4)}
.dot.on{background:linear-gradient(180deg,#5fe88a,#28b85a);box-shadow:0 0 8px rgba(70,224,122,.8)}
.install{position:absolute;right:5%;bottom:3.5%;background:linear-gradient(180deg,#5fd35a,#2faa3a);color:#fff;border:none;border-radius:999px;padding:13px 30px;font-weight:900;font-size:min(5vw,22px);z-index:32;box-shadow:0 6px 14px rgba(34,140,50,.5),inset 0 1px 0 rgba(255,255,255,.5);cursor:pointer;animation:ctaPulse 1.3s infinite}
@keyframes ctaPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
#overlay{position:absolute;inset:0;background:rgba(8,12,20,.62);display:none;align-items:center;justify-content:center;z-index:50}
.card{width:80%;background:linear-gradient(180deg,#f4f9ff,#dfeaff);border-radius:28px;padding:30px 26px;text-align:center;box-shadow:0 20px 44px rgba(0,0,0,.5)}
.card h1{margin:0 0 8px;color:#1f3c6e;font-size:min(12vw,46px)}
.card p{margin:0 0 20px;color:#3a5a8c;font-size:min(5vw,22px);font-weight:700;line-height:1.4}
.bigbtn{border:none;border-radius:999px;background:linear-gradient(180deg,#5fd35a,#2faa3a);color:#fff;padding:16px 40px;font-size:min(6vw,26px);font-weight:900;cursor:pointer;box-shadow:0 6px 16px rgba(34,140,50,.5);animation:ctaPulse 1.4s infinite}
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div class="pill"><span>🔍</span><span>Find Differences</span></div>
    <div class="pill"><b id="foundValue">0</b><span>/</span><b id="totalValue">0</b></div>
  </div>
  <div class="toptip" id="toptip">Tap the differences between the two pictures</div>

  <div id="stack">
    <div class="panel" id="panelA"><span class="plabel">A</span><div class="imgbox" id="boxA"><img id="imgA" alt="" /></div></div>
    <div class="panel" id="panelB"><span class="plabel">B</span><div class="imgbox" id="boxB"><img id="imgB" alt="" /></div>
      <div class="ripple" id="hintRipple"></div>
      <div class="hand" id="hintHand">
        <svg viewBox="0 0 24 24" width="46" height="46" xmlns="http://www.w3.org/2000/svg"><path d="M9 11V5.5a1.5 1.5 0 0 1 3 0V11l1-4.2a1.4 1.4 0 0 1 2.75.6L15 11.5l1.4-2.6a1.3 1.3 0 0 1 2.4.95l-.9 5.6c-.5 3.1-2.5 5-5.7 5-2.6 0-4-1-5.5-3L4.4 13.6a1.4 1.4 0 0 1 2-1.9L9 13.5z" fill="#fff" stroke="#1f3c6e" stroke-width="1" stroke-linejoin="round"/></svg>
      </div>
    </div>
  </div>

  <div id="dots"></div>
  <button class="install" id="installBtn">Install</button>

  <div id="overlay">
    <div class="card">
      <h1 id="ovTitle">You Win!</h1>
      <p id="ovText">You found them all! Play the full game now.</p>
      <button class="bigbtn" id="ovBtn">Install</button>
    </div>
  </div>
</div>

<script>
var CLICK_URL = "STORE_URL_PLACEHOLDER";

  function openStore() {
    try {
      if (window.mraid && typeof window.mraid.open === 'function') {
        window.mraid.open(CLICK_URL);
        return;
      }
    } catch (e) {}
    try {
      window.open(CLICK_URL, '_blank', 'noopener');
      return;
    } catch (e) {}
    window.location.href = CLICK_URL;
  }

var IMG_A = /*{{IMG_A}}*/"";
var IMG_B = /*{{IMG_B}}*/"";
// normalized difference points: [{x,y,r}], x/y in 0..1 of the image content box
var DIFFS = /*{{DIFFS}}*/[];

// ===== audio (synth, no BGM) =====
var AC=null;
function actx(){ try{ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended') AC.resume(); }catch(e){} return AC; }
function beep(f,d,t,v){ var c=actx(); if(!c) return; try{ var o=c.createOscillator(),g=c.createGain(); o.type=t||'sine'; o.frequency.value=f; g.gain.value=v||0.12; o.connect(g); g.connect(c.destination); var n=c.currentTime; o.start(n); g.gain.exponentialRampToValueAtTime(0.0001,n+(d||0.12)); o.stop(n+(d||0.12)); }catch(e){} }
function sfxHit(){ beep(680,0.09,'triangle',0.13); setTimeout(function(){beep(940,0.12,'triangle',0.12);},70); }
function sfxMiss(){ beep(180,0.16,'sawtooth',0.10); }
function sfxWin(){ [523,659,784,1047].forEach(function(f,i){ setTimeout(function(){beep(f,0.18,'triangle',0.14);},i*120); }); }

var found=[]; // booleans per diff
var DEFAULT_R=0.05;

var imgA=document.getElementById('imgA');
var imgB=document.getElementById('imgB');
var boxA=document.getElementById('boxA');
var boxB=document.getElementById('boxB');
var natW=0, natH=0;

function buildDots(){
  var d=document.getElementById('dots'); d.innerHTML='';
  for(var i=0;i<DIFFS.length;i++){ var s=document.createElement('div'); s.className='dot'; d.appendChild(s); }
  document.getElementById('totalValue').textContent=DIFFS.length;
}
function updateDots(){
  var dots=document.getElementById('dots').children;
  var n=0;
  for(var i=0;i<DIFFS.length;i++){ if(found[i]){ if(dots[i]) dots[i].classList.add('on'); n++; } }
  document.getElementById('foundValue').textContent=n;
  return n;
}

// size the contain-fitted image box so click math maps to the displayed image content
function fitBox(panel, box, img){
  var pw=panel.clientWidth, ph=panel.clientHeight;
  if(!natW||!natH){ box.style.width=pw+'px'; box.style.height=ph+'px'; return; }
  var scale=Math.min(pw/natW, ph/natH);
  var w=natW*scale, h=natH*scale;
  box.style.width=w+'px'; box.style.height=h+'px';
}
function fitAll(){
  fitBox(document.getElementById('panelA'), boxA, imgA);
  fitBox(document.getElementById('panelB'), boxB, imgB);
  redrawMarks();
  positionHint();
}

function addMark(box, nx, ny){
  var bw=box.clientWidth, bh=box.clientHeight;
  var m=document.createElement('div'); m.className='mark';
  var size=Math.max(bw,bh)*(DEFAULT_R*1.8);
  m.style.width=size+'px'; m.style.height=size+'px';
  m.style.left=(nx*bw)+'px'; m.style.top=(ny*bh)+'px';
  m.setAttribute('data-mark','1');
  box.appendChild(m);
}
function addMiss(box, nx, ny){
  var bw=box.clientWidth, bh=box.clientHeight;
  var m=document.createElement('div'); m.className='miss'; m.textContent='✕';
  m.style.left=(nx*bw)+'px'; m.style.top=(ny*bh)+'px';
  box.appendChild(m);
  setTimeout(function(){ if(m.parentNode) m.parentNode.removeChild(m); }, 520);
}
function redrawMarks(){
  [boxA,boxB].forEach(function(box){
    var old=box.querySelectorAll('[data-mark]'); for(var i=0;i<old.length;i++) old[i].remove();
  });
  for(var i=0;i<DIFFS.length;i++){ if(found[i]){ addMark(boxA,DIFFS[i].x,DIFFS[i].y); addMark(boxB,DIFFS[i].x,DIFFS[i].y); } }
}

// ===== first-time tutorial hand =====
var hintOn=false;
function firstUnfound(){ for(var i=0;i<DIFFS.length;i++){ if(!found[i]) return i; } return -1; }
function positionHint(){
  if(!hintOn) return;
  var idx=firstUnfound();
  if(idx<0){ hideHint(); return; }
  var panel=document.getElementById('panelB');
  var hand=document.getElementById('hintHand');
  var rip=document.getElementById('hintRipple');
  // box is centered in panel; convert box-normalized point to panel coords
  var bx=(panel.clientWidth-boxB.clientWidth)/2 + DIFFS[idx].x*boxB.clientWidth;
  var by=(panel.clientHeight-boxB.clientHeight)/2 + DIFFS[idx].y*boxB.clientHeight;
  rip.style.left=bx+'px'; rip.style.top=by+'px';
  hand.style.left=bx+'px'; hand.style.top=by+'px';
}
function showHint(){
  if(hintOn || firstUnfound()<0) return;
  hintOn=true;
  document.getElementById('hintHand').classList.add('show');
  document.getElementById('hintRipple').classList.add('show');
  positionHint();
}
function hideHint(){
  if(!hintOn) return;
  hintOn=false;
  document.getElementById('hintHand').classList.remove('show');
  document.getElementById('hintRipple').classList.remove('show');
}

function onTap(box, ev){
  actx();
  hideHint();
  var rect=box.getBoundingClientRect();
  var pt=(ev.touches&&ev.touches[0])||ev;
  var nx=(pt.clientX-rect.left)/rect.width;
  var ny=(pt.clientY-rect.top)/rect.height;
  if(nx<0||nx>1||ny<0||ny>1) return;
  var hit=-1, best=1e9;
  for(var i=0;i<DIFFS.length;i++){
    if(found[i]) continue;
    var r=(DIFFS[i].r||DEFAULT_R);
    var dx=nx-DIFFS[i].x, dy=ny-DIFFS[i].y;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<=r && dist<best){ best=dist; hit=i; }
  }
  if(hit>=0){
    found[hit]=true; sfxHit();
    addMark(boxA,DIFFS[hit].x,DIFFS[hit].y);
    addMark(boxB,DIFFS[hit].x,DIFFS[hit].y);
    var n=updateDots();
    if(n>=DIFFS.length) setTimeout(win,360);
  } else {
    sfxMiss(); addMiss(box,nx,ny);
  }
}

function win(){
  document.getElementById('overlay').style.display='flex';
  sfxWin();
}

var _inited=false;
function init(){
  if(_inited) return; _inited=true;
  document.getElementById('installBtn').onclick=openStore;
  document.getElementById('ovBtn').onclick=openStore;
  imgA.src=IMG_A; imgB.src=IMG_B;
  for(var i=0;i<DIFFS.length;i++) found.push(false);
  buildDots(); updateDots();
  var loaded=0;
  function onLoad(){ loaded++; if(loaded>=1){ natW=imgA.naturalWidth||imgB.naturalWidth; natH=imgA.naturalHeight||imgB.naturalHeight; fitAll(); setTimeout(showHint,500); } }
  imgA.onload=onLoad; imgB.onload=onLoad;
  if(imgA.complete && imgA.naturalWidth){ onLoad(); }
  boxA.parentNode.addEventListener('click', function(e){ onTap(boxA,e); });
  boxB.parentNode.addEventListener('click', function(e){ onTap(boxB,e); });
  window.addEventListener('resize', fitAll);
}
window.addEventListener('load', init);
if(document.readyState==='complete') init();
</script>
</body>
</html>
